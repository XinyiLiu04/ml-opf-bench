site_name: ML-OPF Benchmark
repo_url: https://github.com/XinyiLiu04/ml-opf-bench 
repo_name: GitHub (ml-opf-bench)  

# style
theme:
  name: material
  palette:
    primary: black
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - content.code.copy
  font:
    text: Roboto
    code: Fira Code

# 仅保留必选插件（无charts，避免报错）
plugins:
  - search:          # 搜索功能（MkDocs 原生）
  - table-reader:    # 读取CSV生成表格（核心需求）

# LaTeX 公式渲染（ML-OPF 必备）
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:  # 支持代码块/图片嵌套
  - tables:                # 原生表格渲染
  - attr_list:             # 自定义图片样式

# 公式渲染依赖的 MathJax 脚本
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 导航栏（按需调整）
nav:
  - Overview: index.md
  - Experiments setup:
    - datasets: benchmark/datasets.md
    - metrics: benchmark/metrics.md
  - Bench Results:
    - Results: results/comparison.md
    - accuracy: results/accuracy.md
  - Code: resources.md
  - References: references.md